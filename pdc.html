<p>

<ul id=filePreview></ul>
<p>

<h2>PDC Editor</h2>
<div hidden>
	<label for=pdcFormatVersionInput>Format Version</label>

</div>

	<label for=pdcFileFormatInput>Format</label>

<pre id=pdcHex></pre>

<script>

var CMD_TYPE_PATH	= 1
var CMD_TYPE_CIRCLE	= 2
var CMD_TYPE_PRECISE	= 3

var DEFAULT_VIEWBOX_X	= 32
var DEFAULT_VIEWBOX_Y	= 32
var DEFAULT_CMD_COUNT	= 1
var DEFAULT_CMD_TYPE	= CMD_TYPE_PATH
var DEFAULT_RADIUS	= 10

var uniqueIndex = 0	// Incremented on each usage

function onError(msg)
{
	window.alert(msg)
}

function removeChildren(parent)
{
	while (parent.firstChild)
		parent.removeChild(parent.firstChild)
}

function parseU16(b1, b2)
{
	return (Number(b1) & 0xFF) | ((Number(b2) & 0xFF) << 8)
}

function parsePdc(bytes)
{
	var i, j, bi, magicWord, type
	var inpit, command, commands, point, points

	if (bytes.length < 8) {
		onError('Invalid PDC file, size is < 8')
		return
	}

	bi = 0

	magicWord = ''
	magicWord += String.fromCharCode(bytes[bi++])
	magicWord += String.fromCharCode(bytes[bi++])
	magicWord += String.fromCharCode(bytes[bi++])
	magicWord += String.fromCharCode(bytes[bi++])

	switch (magicWord) {
	case 'PDCI':
		pdcFileFormatInput.value = magicWord
		break
	case 'PDCS':
		onError('PDCS support is not implemented')
		return
	default:
		onError('Invalid magic word ' + magicWord)
		return
	}

	bi += 4		// Skip image size
	pdcImageSizeInput.value = bytes.length - 8

	pdcImageVersionInput.value = bytes[bi++]
	pdcImageReservedInput.value = bytes[bi++]
	pdcImageViewBoxXInput.value = parseU16(bytes[bi++], bytes[bi++])
	pdcImageViewBoxYInput.value = parseU16(bytes[bi++], bytes[bi++])
	pdcNumberOfCommandsInput.value = parseU16(bytes[bi++], bytes[bi++])
	numberOfCommandsOnChange({ target: pdcNumberOfCommandsInput })

	commands = pdcFileFormatContainer.querySelector('.commands').children

	for (i = 0; i < commands.length; i++) {
		command = commands[i]

		type = bytes[bi++]

		switch (type) {
		case CMD_TYPE_PATH:
		case CMD_TYPE_CIRCLE:
			input = command.querySelector('[id^=pdcCommandTypeInput]')
			input.value = type
			break
		case CMD_TYPE_PRECISE:
			onError("Precise path is currently not supported")
			return
		default:
			onError("Invalid command type " + type)
			return
		}
		
		input = command.querySelector('[id^=pdcCommandIsHiddenInput]')
		input.checked = !!bytes[bi++]

		input = command.querySelector('[id^=pdcCommandStrokeColorInput]')
		input.value = bytes[bi++]

		input = command.querySelector('[id^=pdcCommandStrokeWidthInput]')
		input.value = bytes[bi++]

		input = command.querySelector('[id^=pdcCommandFillColorInput]')
		input.value = bytes[bi++]

		switch (type) {
		case CMD_TYPE_CIRCLE:
			input = command.querySelector('[id^=pdcCommandIsPathOpenInput]')
			input.checked = false

			input = command.querySelector('[id^=pdcCommandRadiusInput]')
			input.value = parseU16(bytes[bi++], bytes[bi++])

			break
		default:
			input = command.querySelector('[id^=pdcCommandIsPathOpenInput]')
			input.checked = bytes[bi++]
			bi++	// Ignore second byte

			input = command.querySelector('[id^=pdcCommandRadiusInput]')
			input.value = DEFAULT_RADIUS
		}

		input = command.querySelector('[id^=pdcCommandNumberOfPointsInput]')
		input.value = parseU16(bytes[bi++], bytes[bi++])
		commandNumberOfPointsOnChange({ target: input })

		if (type === CMD_TYPE_CIRCLE && Number(input.value) != 1) {
			onError("Expected only 1 point for circle, got " + input.value)
			return
		}

		points = command.querySelector('.points').children
		for (j = 0; j < points.length; j++) {
			point = points[j]

			input = point.querySelector('[id^=pdcPointX]')
			input.value = parseU16(bytes[bi++], bytes[bi++])

			input = point.querySelector('[id^=pdcPointY]')
			input.value = parseU16(bytes[bi++], bytes[bi++])
		}
	}

	inputOnChange()
}

function fileUploadOnChange(e)
{
	e.target.files[0].bytes().then(parsePdc)
}

function uint8FromInputs()
{
	var i, j, n
	var pdc
	var input, command, commandType, commands, point, points

	pdci = 0
	pdc = []

	switch (pdcFileFormatInput.value) {
	case 'PDCI':
		pdc.push('P'.charCodeAt(0))
		pdc.push('D'.charCodeAt(0))
		pdc.push('C'.charCodeAt(0))
		pdc.push('I'.charCodeAt(0))
		break
	case 'PDCS':
		onError('PDCS is not yet implemented')
		break
	default:
		onError('Invalid PDC File Format')
	}

	// Updated at the end
	pdc.push(0)
	pdc.push(0)
	pdc.push(0)
	pdc.push(0)

	pdc.push(Number(pdcImageVersionInput.value))
	pdc.push(Number(pdcImageReservedInput.value))

	n = Number(pdcImageViewBoxXInput.value)
	pdc.push((n >> 0) & 0xFF)
	pdc.push((n >> 8) & 0xFF)

	n = Number(pdcImageViewBoxYInput.value)
	pdc.push((n >> 0) & 0xFF)
	pdc.push((n >> 8) & 0xFF)

	n = Number(pdcNumberOfCommandsInput.value)
	pdc.push((n >> 0) & 0xFF)
	pdc.push((n >> 8) & 0xFF)

	commands = pdcFileFormatContainer.querySelectorAll('.command')

	for (i = 0; i < commands.length; i++) {
		command = commands[i]

		input = command.querySelector('[id^=pdcCommandTypeInput]')
		commandType = Number(input.value)
		pdc.push(commandType)

		input = command.querySelector('[id^=pdcCommandIsHiddenInput]')
		pdc.push(input.checked ? 0x01 : 0x00)

		input = command.querySelector('[id^=pdcCommandStrokeColorInput]')
		pdc.push(Number(input.value))

		input = command.querySelector('[id^=pdcCommandStrokeWidthInput]')
		pdc.push(Number(input.value))

		input = command.querySelector('[id^=pdcCommandFillColorInput]')
		pdc.push(Number(input.value))

		switch (commandType) {
		default:
			input = command.querySelector('[id^=pdcCommandIsPathOpenInput]')
			pdc.push(input.checked ? 0x01 : 0x00)
			pdc.push(0)
			break
		case CMD_TYPE_CIRCLE:
			input = command.querySelector('[id^=pdcCommandRadiusInput]')
			n = Number(input.value)
			pdc.push((n >> 0) & 0xFF)
			pdc.push((n >> 8) & 0xFF)
			break
		}

		input = command.querySelector('[id^=pdcCommandNumberOfPointsInput]')
		n = Number(input.value)
		pdc.push((n >> 0) & 0xFF)
		pdc.push((n >> 8) & 0xFF)

		points = command.querySelectorAll('.point')
		for (j = 0; j < points.length; j++) {
			point = points[j]

			input = point.querySelector('[id^=pdcPointX]')
			n = Number(input.value)
			pdc.push((n >> 0) & 0xFF)
			pdc.push((n >> 8) & 0xFF)

			input = point.querySelector('[id^=pdcPointY]')
			n = Number(input.value)
			pdc.push((n >> 0) & 0xFF)
			pdc.push((n >> 8) & 0xFF)
		}
	}

	n = pdc.length - 8
	pdc[4] = (n >>  0) & 0x00FF
	pdc[5] = (n >>  8) & 0x00FF
	pdc[6] = (n >> 16) & 0x00FF
	pdc[7] = (n >> 24) & 0x00FF

	return new Uint8Array(pdc)
}

function inputOnChange()
{
	var i, name, pdc, blob, url

	name = 'image.pdc'
	pdc = uint8FromInputs()

	pdcHex.innerText = ''
	for (i = 0; i < pdc.length; i++) {
		if (i % 16 == 0) pdcHex.innerText += '\n'
		pdcHex.innerText += pdc[i].toString(16).padStart(2, 0) + ' '
	}
	pdcHex.innerText = pdcHex.innerText.trim()

	base64 = pdc.toBase64()
	pdcBase64.innerText = base64
	previewLink.href = 'https://pdc-tool.heikobehrens.com/render?data=' + base64 + '&filename=' + name

	blob = new Blob([pdc], { type: 'application/octet-stream' })
	downloadLink.href = window.URL.createObjectURL(blob)
	downloadLink.download = name

	url = new URL(location)
	url.searchParams.set('data', base64)
	history.pushState({}, '', url)

	// TODO(irek): Restore state from URL on page load
}

function appendInput(parent, input, labelText, labelTitle)
{
	var wrapper, label

	wrapper = document.createElement('div')
	label = document.createElement('label')
	space = document.createTextNode(' ')

	label.setAttribute('for', input.id)
	label.innerText = labelText

	if (labelTitle)
		label.title = labelTitle

	wrapper.hidden = input.hidden
	parent.appendChild(wrapper)
	wrapper.appendChild(label)
	wrapper.appendChild(space)
	wrapper.appendChild(input)

	input.addEventListener('change', inputOnChange)
}

function createOption(value, text, selected, disabled)
{
	var option

	option = document.createElement('option')
	option.value = value
	option.text = text
	option.selected = !!selected
	option.disabled = !!disabled

	return option
}

function pointNew(parent)
{
	var wrapper, input, label, node

	index = uniqueIndex++

	wrapper = document.createElement('li')
	wrapper.classList.add('point')
	parent.appendChild(wrapper)

	input = document.createElement('input')
	label = document.createElement('label')
	node = document.createTextNode(' ')

	input.id = 'pdcPointX' + index
	input.type = 'number'
	input.value = 0
	input.min = 0
	input.max = 0xFFFF
	label.setAttribute('for', input.id)
	label.innerText = 'x'
	input.addEventListener('change', inputOnChange)
	wrapper.appendChild(label)
	wrapper.appendChild(node)
	wrapper.appendChild(input)

	node = document.createTextNode(' ')
	wrapper.appendChild(node)

	input = document.createElement('input')
	label = document.createElement('label')
	node = document.createTextNode(' ')

	input.id = 'pdcPointY' + index
	input.type = 'number'
	input.value = 0
	input.min = 0
	input.max = 0xFFFF
	label.setAttribute('for', input.id)
	label.innerText = 'y'
	input.addEventListener('change', inputOnChange)
	wrapper.appendChild(label)
	wrapper.appendChild(node)
	wrapper.appendChild(input)
}

function commandNumberOfPointsOnChange(e)
{
	var i, count, list, elements, input

	list = e.target.parentElement.parentElement.querySelector('.points')
	count = Number(e.target.value)

	for (i = list.children.length; i < count; i++)
		pointNew(list)

	for (i = list.children.length; i > count; i--)
		list.removeChild(list.lastElementChild)
}

function commandNew(parent)
{
	var index, wrapper, input, option

	index = uniqueIndex++

	wrapper = document.createElement('li')
	wrapper.classList.add('command')
	parent.appendChild(wrapper)

	input = document.createElement('select')
	input.id = 'pdcCommandTypeInput' + index
	input.appendChild(createOption(CMD_TYPE_PATH, 'Path', DEFAULT_CMD_TYPE == CMD_TYPE_PATH))
	input.appendChild(createOption(CMD_TYPE_CIRCLE, 'Circle', DEFAULT_CMD_TYPE == CMD_TYPE_CIRCLE))
	input.appendChild(createOption(CMD_TYPE_PRECISE, 'Precise path', false, true))
	appendInput(wrapper, input, 'Type')

	input = document.createElement('input')
	input.id = 'pdcCommandIsHiddenInput' + index
	input.type = 'checkbox'
	appendInput(wrapper, input, 'Hidden')

	input = createColorPickerSelect()
	input.id = 'pdcCommandStrokeColorInput' + index
	appendInput(wrapper, input, 'Stroke color')

	input = document.createElement('input')
	input.id = 'pdcCommandStrokeWidthInput' + index
	input.type = 'number'
	input.value = 0
	input.min = 0
	input.max = 0xFF
	appendInput(wrapper, input, 'Stroke width')

	input = createColorPickerSelect()
	input.id = 'pdcCommandFillColorInput' + index
	appendInput(wrapper, input, 'Fill color')

	input = document.createElement('input')
	input.id = 'pdcCommandIsPathOpenInput' + index
	input.type = 'checkbox'
	appendInput(wrapper, input, 'Is path open')

	input = document.createElement('input')
	input.id = 'pdcCommandRadiusInput' + index
	input.type = 'number'
	input.value = DEFAULT_RADIUS
	input.min = 0
	input.max = 0xFFFF
	appendInput(wrapper, input, 'Radius')

	input = document.createElement('input')
	input.id = 'pdcCommandNumberOfPointsInput' + index
	input.type = 'number'
	input.value = '1'
	input.min = 1
	input.max = 0xFFFF
	input.addEventListener('change', commandNumberOfPointsOnChange)
	appendInput(wrapper, input, 'Number of points')

	list = document.createElement('ol')
	list.classList.add('points')
	wrapper.appendChild(list)

	commandNumberOfPointsOnChange({ target: input })
}

function numberOfCommandsOnChange(e)
{
	var i, count, list, elements, input

	list = e.target.parentElement.parentElement.querySelector('.commands')
	count = Number(e.target.value)

	for (i = list.children.length; i < count; i++)
		commandNew(list)

	for (i = list.children.length; i > count; i--)
		list.removeChild(list.lastElementChild)
}

function pdcImageFileNew(parent)
{
	var input

	input = document.createElement('input')
	input.id = 'pdcMagicWordInput'
	input.type = 'text'
	input.value = 'PDCI'
	input.disabled = true
	input.hidden = true
	appendInput(parent, input, 'Magic word')

	input = document.createElement('input')
	input.id = 'pdcImageSizeInput'
	input.type = 'number'
	input.min = '0'
	input.max = 0xFFFFFFFF
	input.value = '0'
	input.disabled = true
	input.hidden = true
	appendInput(parent, input, 'Image size')

	input = document.createElement('input')
	input.id = 'pdcImageVersionInput'
	input.type = 'number'
	input.value = '1'
	input.min = 0
	input.max = 0xFF
	input.hidden = true
	appendInput(parent, input, 'Version')

	input = document.createElement('input')
	input.id = 'pdcImageReservedInput'
	input.type = 'number'
	input.value = '0'
	input.min = 0
	input.max = 0xFF
	input.disabled = true
	input.hidden = true
	appendInput(parent, input, 'Reserved')

	input = document.createElement('input')
	input.id = 'pdcImageViewBoxXInput'
	input.type = 'number'
	input.value = DEFAULT_VIEWBOX_X
	input.min = 1
	input.max = 0xFFFF
	appendInput(parent, input, 'View box x')

	input = document.createElement('input')
	input.id = 'pdcImageViewBoxYInput'
	input.type = 'number'
	input.value = DEFAULT_VIEWBOX_Y
	input.min = 1
	input.max = 0xFFFF
	appendInput(parent, input, 'View box y')

	input = document.createElement('input')
	input.id = 'pdcNumberOfCommandsInput'
	input.type = 'number'
	input.value = DEFAULT_CMD_COUNT
	input.min = 1
	input.max = 0xFFFF
	input.addEventListener('change', numberOfCommandsOnChange)
	appendInput(parent, input, 'Number of commands')

	list = document.createElement('ol')
	list.classList.add('commands')
	parent.appendChild(list)

	numberOfCommandsOnChange({ target: input })
}

function pdcFileFormatOnChange(e)
{
	removeChildren(pdcFileFormatContainer)

	switch (e.target.value) {
	case 'PDCI':
		pdcImageFileNew(pdcFileFormatContainer)
		break
	case 'PDCS':
		onError('PDCS is not yet implemented')
		break
	default:
		onError('Invalid PDC File Format')
	}
}
